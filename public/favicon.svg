  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="8" y="8" width="48" height="48" rx="14" fill="#ffffff" filter="url(#shadow)"/>
  <text x="50%" y="49%" text-anchor="middle" dominant-baseline="middle" font-family="Cormorant Garamond, Georgia, serif" font-weight="700" font-size="34">
    <tspan fill="#2d2a26">R</tspan><tspan fill="#c05d3e">B</tspan>
  </text>
  <circle cx="50" cy="16" r="4" fill="#c05d3e" opacity="0.25"/>
